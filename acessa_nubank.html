<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estar no controle nunca foi tão simples | Nubank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="menu">
            <div class="logo">Nubank</div>
            <ul class="logo_links">
                <li><a href="#">Nubank</a></li>
                <li><a href="#">Nu Empresas</a></li>
                <li><a href="#">Nubank Ultravioleta</a></li>
                <li><a href="#">Segurança</a></li>
                <li><a href="#">Saiba Mais</a></li>
            </ul>
            <div class="nav_buttons">
                <button class="btn_login">Login Empresa</button>
                <button class="btn_NU">Quero ser NU</button>
            </div>
        </nav>
    </header>

    <main class="split-screen">
        <div class="left-side">
            <div class="form-content">
                <span class="purple-tag">Cartão Nu</span>
                <h1>O Roxo que te deixa no controle</h1>

                <div class="input-card">
                    <label>Faça seu cartão NU e conheça a liberdade</label>
                    <div class="input-group">
                        <input type="text" id="cnpj-cpf" placeholder="Digite seu CNPJ ou CPF" maxlength="18">
                        <p id="error-message" class="error-text"></p>
                    </div>
                    <button id="id-submit" class="btn-large" disabled>
                        Continuar
                        <span class="arrow">→</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="hero-image-container">
                <img src="https://images.unsplash.com/photo-1556740758-90de374c12ad?auto=format&fit=crop&w=1200&q=80" alt="Nubank Imagem">
            </div>
        </div>
    </main>

    <script src=""></script>
</body>
</html>
