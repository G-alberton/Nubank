<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veja o seu futuro na sua mão | Nubank</title>
    <link rel="stylesheet" href="css/acesso.css">
</head>
<body>
    <header>
        <div class="menu">
            <div class="logo"><a href="index.html">Nubank</a></div>
            <ul class="logo_links">
                <li><a href="acessa_nubank.html">Nubank</a></li>
                <li><a href="acessa_nubank_Empesa.html">Nu Empresas</a></li>
                <li><a href="acessa_nubank_ultravioleta.html">Nubank Ultravioleta</a></li>
                <li><a href="seguranca.html">Segurança</a></li>
            </ul>
            <div class="nav_buttons">
                <a href="login.html"><button class="btn_login">Login Empresa</button></a>
                <a href="cadastro.html"><button class="btn_NU">Quero ser NU</button></a>
            </div>
        </div>
    </header>

     <main class="split-screen">
        <div class="left-side">
            <div class="form-content">
                <span class="purple-tag">Cartão Nu</span>
                <h1>Todo controle em uma mão</h1>

                <div class="input-card">
                    <label>Acesse e conheça o controle</label>
                    <div class="input-group">
                        <input type="text" id="cnpj-cpf" placeholder="Digite seu CNPJ ou CPF" maxlength="18">
                        <p id="error-message" class="error-text"></p>
                    </div>
                    <button id="id-submit" class="btn-large" disabled>
                        Continuar
                        <span class="arrow">→</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="hero-image-container">
               <img src="https://statics.otvfoco.com.br/2023/09/Pessoa-feliz-segurando-cartao-do-Nubank.jpg" alt="Pessoa sorrindo com celular">
            </div>
        </div>

     </main>
</body>
</html>
