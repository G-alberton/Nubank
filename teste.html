<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nu Selection | Experiência Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <section class="container">
        <div class="content">
            <span class="badge">Novo</span>
            <h1>Escolha seu nível de <span class="purple-text">liberdade</span>.</h1>
            <p>Um cartão para cada momento da sua vida. Design minimalista com tecnologia de ponta.</p>
            
            <div class="selectors">
                <button class="dot active" onclick="changeCard('roxo', this)" data-name="Nubank Classic"></button>
                <button class="dot" onclick="changeCard('prata', this)" data-name="Nubank Platinum"></button>
                <button class="dot" onclick="changeCard('preto', this)" data-name="Nubank Ultravioleta"></button>
            </div>
            <h2 id="card-title">Nubank Classic</h2>
        </div>

        <div class="card-wrapper">
            <div class="card" id="main-card">
                <div class="card-inner">
                    <div class="chip"></div>
                    <div class="contactless">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M4 15c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0-4c3.31 0 6 2.69 6 6s-2.69 6-6 6v-1.5c2.48 0 4.5-2.02 4.5-4.5S10.48 12.5 8 12.5V11zm0-4c5.52 0 10 4.48 10 10s-4.48 10-10 10v-1.5c4.69 0 8.5-3.81 8.5-8.5S17.19 8.5 12.5 8.5V7z"/></svg>
                    </div>
                    <div class="card-footer">
                        <span class="user-name">CLIENTE NU</span>
                        <span class="brand">nu</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
