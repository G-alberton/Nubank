<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubank - Peça sua conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <a href="index.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Voltar
    </a>

    <main class="container">
        <section class="left-side">
            <h1 class="nu-title">A conta digital que você <span class="purple-text">merece</span>.</h1>
            <p class="nu-description">Cartão sem anuidade e controle total pelo app. Junte-se aos mais de 100 milhões de clientes.</p>
            
            <form id="formCadastro" class="nu-form">
                <input type="text" id="cpf" placeholder="CPF" maxlength="14">
                <input type="text" placeholder="Nome Completo">
                <input type="text" placeholder="Celular">
                <input type="email" placeholder="E-mail">
                
                <div class="checkbox-group">
                    <input type="checkbox" id="checkPrivacidade">
                    <label for="checkPrivacidade">Eu li e aceito as condições de tratamento de dados.</label>
                </div>
                
                <button type="submit" id="btnEnviar" class="nu-button" disabled>Continuar</button>
            </form>
        </section>

        <section class="right-side">
            <div class="flip-container">
                <div class="flipper">
                    <div class="front">
                        <img src="img/celular.png" alt="App Nubank">
                    </div>
                    <div class="back">
                        <img src="img/cartao.png" alt="Cartão Nubank">
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/cadastro.js"></script>
</body>
</html>
